services:
  db-test:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_db_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://crm_user:crm_password@db-test:5432/crm_db_test
      JWT_SECRET: test-secret-key
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
    depends_on:
      db-test:
        condition: service_healthy
    command: cargo test
    volumes:
      - ./backend:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-target:/app/target

volumes:
  cargo-registry:
  cargo-target:
